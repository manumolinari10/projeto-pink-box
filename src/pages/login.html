<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkBox | Login</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <style>
        :root {
            --pink: #d80a77;
            --pink-dark: #b10362;
            --text: #4a4a4a;
            --muted: #8a8a8a;
            --line: rgba(74, 74, 74, 0.28);
            --white: #ffffff;
            --font-main: "Century Gothic", "Poppins", "Trebuchet MS", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: var(--font-main);
            color: var(--text);
            background: #f7f7f7;
        }

        .login-page {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(320px, 1fr) minmax(420px, 1fr);
            background: var(--white);
        }

        .login-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 56px clamp(28px, 7vw, 116px);
            background: linear-gradient(180deg, #ffffff 0%, #fcfcfc 100%);
        }

        .login-content {
            width: 100%;
            max-width: 565px;
        }

        .brand {
            width: min(100%, 250px);
            display: block;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: clamp(56px, 10vh, 132px);
        }

        .title {
            margin-bottom: 18px;
            font-size: clamp(2rem, 2.6vw, 3rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: 0.01em;
            text-transform: uppercase;
            color: var(--pink);
        }

        .title strong {
            font-weight: 700;
        }

        .subtitle {
            margin-bottom: clamp(28px, 2.5vh, 54px);
            font-size: clamp(1.1rem, 1.4vw, 1.45rem);
            line-height: 1.5;
            color: var(--muted);
        }

        .form {
            width: 100%;
        }

        .field {
            position: relative;
            margin-bottom: 26px;
            padding-top: 8px;
        }

        .field label {
            position: absolute;
            top: 18px;
            left: 0;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            pointer-events: none;
            transform-origin: left top;
            transition: top 0.2s ease, transform 0.2s ease, color 0.2s ease;
        }

        .field input {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--line);
            background: transparent;
            padding: 14px 0 10px;
            font: inherit;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.25s ease;
        }

        .field input:focus {
            border-bottom-color: var(--pink);
        }

        .field input:focus + label,
        .field input:not(:placeholder-shown) + label {
            top: 0;
            color: var(--pink);
            transform: scale(0.78);
        }

        .field input::placeholder {
            color: transparent;
        }

        .forgot-password {
            display: inline-block;
            margin: 10px 0 34px;
            font-size: 0.95rem;
            font-style: italic;
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: var(--pink);
        }

        .submit-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 132px;
            min-height: 46px;
            padding: 8px 14px;
            border: 2px solid rgba(74, 74, 74, 0.45);
            background: transparent;
            color: var(--text);
            font: inherit;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .submit-button:hover {
            border-color: var(--pink);
            color: var(--pink);
            transform: translateY(-1px);
        }

        .visual-panel {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: clamp(32px, 5vw, 72px);
            background:
                linear-gradient(180deg, rgba(216, 10, 119, 0.78) 0%, rgba(176, 3, 98, 0.82) 100%),
                url("../assets/bg-login.webp") center center / cover no-repeat;
            isolation: isolate;
        }

        .visual-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0) 55%);
            z-index: -1;
        }

        .quote {
            max-width: 720px;
            color: var(--white);
            text-align: left;
        }

        .quote p {
            margin-bottom: 38px;
            font-size: clamp(1.2rem, 2.2vw, 3.05rem);
            font-style: italic;
            font-weight: 300;
            line-height: 1.16;
            letter-spacing: 0.01em;
        }

        .quote footer {
            font-size: clamp(1.4rem, 1.6vw, 2.35rem);
            font-style: italic;
            font-weight: 300;
            text-align: right;
        }

        .is-ready .login-content,
        .is-ready .quote {
            opacity: 1;
            transform: translateY(0);
        }

        .login-content,
        .quote {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        @media (max-width: 1080px) {
            .login-page {
                grid-template-columns: 1fr;
            }

            .login-panel {
                min-height: auto;
                padding-top: 40px;
                padding-bottom: 40px;
            }

            .brand {
                margin-bottom: 48px;
            }

            .subtitle {
                margin-bottom: 52px;
            }

            .visual-panel {
                min-height: 420px;
                align-items: center;
            }

            .quote {
                max-width: 640px;
            }
        }

        @media (max-width: 640px) {
            .login-panel,
            .visual-panel {
                padding-left: 22px;
                padding-right: 22px;
            }

            .title {
                font-size: 2.1rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .quote p {
                font-size: 1.9rem;
            }

            .quote footer {
                font-size: 1.45rem;
            }

            .submit-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="login-page">
        <section class="login-panel" aria-label="Acesso ao sistema">
            <div class="login-content">
                <img class="brand" src="../assets/logo_horizontal.webp" alt="PinkBox">

                <h1 class="title">Acesse <strong>sua conta</strong></h1>
                <p class="subtitle">Entre com seus dados para continuar.</p>

                <form class="form" action="#" method="post">
                    <div class="field">
                        <input id="email" name="email" type="email" placeholder="E-mail" autocomplete="email">
                        <label for="email">E-mail</label>
                    </div>

                    <div class="field">
                        <input id="password" name="password" type="password" placeholder="Senha" autocomplete="current-password">
                        <label for="password">Senha</label>
                    </div>

                    <a class="forgot-password" href="#">Esqueceu a senha?</a>
                    <div>
                        <button class="submit-button" type="submit">Entrar</button>
                    </div>
                </form>
            </div>
        </section>

        <aside class="visual-panel" aria-label="Mensagem de destaque">
            <blockquote class="quote">
                <p>Você pode ir tão longe quanto sua mente permite. O que você acredita, lembre-se, você pode alcançar.</p>
                <footer>&mdash; Mary Kay Ash</footer>
            </blockquote>
        </aside>
    </main>

    <script>
        window.addEventListener("load", function () {
            document.body.classList.add("is-ready");
        });
    </script>
</body>
</html>
